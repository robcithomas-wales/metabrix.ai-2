<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D4F4F" />
      <stop offset="100%" stop-color="#4ECDC4" />
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGrad1)" />
  
  <!-- Metabolic pulse line -->
  <path 
    d="M 20,50 L 30,50 L 35,38 L 40,62 L 45,42 L 50,58 L 55,45 L 60,50 L 80,50" 
    fill="none" 
    stroke="white" 
    stroke-width="3.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    opacity="0.95"
  />
  
  <!-- Key data points -->
  <circle cx="35" cy="38" r="3" fill="#FF6B6B" opacity="0.9" />
  <circle cx="45" cy="42" r="3" fill="white" opacity="0.95" />
  <circle cx="55" cy="45" r="3" fill="#4ECDC4" opacity="0.9" />
  
  <!-- Accent ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="0.5" opacity="0.2" />
  <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" stroke-dasharray="2 4" />
</svg>